server {
    listen 80;
    server_name _;

    # React SPA static files
    root /app/web/frontend/dist;
    index index.html;

    # SPA fallback: unknown paths → index.html (React Router handles them)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # REST API → Uvicorn
    location /api/ {
        proxy_pass         http://127.0.0.1:8000;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
    }

    # WebSocket → Uvicorn (requires Upgrade handshake headers)
    location /ws {
        proxy_pass             http://127.0.0.1:8000;
        proxy_http_version     1.1;
        proxy_set_header       Upgrade    $http_upgrade;
        proxy_set_header       Connection "upgrade";
        proxy_set_header       Host       $host;
        # Keep long-lived agent streaming connections alive
        proxy_read_timeout     86400s;
        proxy_send_timeout     86400s;
    }

    # PV curve PNG files → Uvicorn (served by FastAPI StaticFiles)
    location /plots/ {
        proxy_pass       http://127.0.0.1:8000/plots/;
        proxy_set_header Host $host;
    }

    # Health probe (used by Render and docker-compose healthcheck)
    location /health {
        proxy_pass       http://127.0.0.1:8000/health;
        proxy_set_header Host $host;
    }
}
